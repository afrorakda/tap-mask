<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Rounds Tabata - Fridge Combo</title>
    
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --rest-green: #e8f5e9;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* 修正：REST（休み）の時だけ色をつける */
        body.work { background-color: var(--bg); }
        body.rest { background-color: var(--rest-green); }

        /* iOS Safari Fix for Inputs */
        input {
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
            border: none;
            background: var(--input-bg);
            color: var(--main);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            padding: 15px;
            border-radius: var(--radius);
            margin-top: 8px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            background: transparent;
        }

        .status-label {
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .round-counter {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #888;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
        }

        button {
            -webkit-appearance: none;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 22px;
            width: 100%;
            border-radius: var(--radius);
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.97); }

        button.stop {
            background: var(--accent);
            color: var(--main);
            margin-top: 15px;
        }

        .hidden { display: none !important; }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            line-height: 1.5;
            background: transparent;
        }

        .support-links {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 修正：Kofiボタンを大きく、Appボタンを小さく */
        .kofi-button {
            flex: 1;
            background: var(--main);
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .install-btn {
            width: auto;
            min-width: 100px;
            background: var(--accent);
            color: var(--main);
            border: none;
            padding: 10px;
            border-radius: var(--radius);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            padding: 30px; 
            border-radius: var(--radius);
            max-width: 320px;
            width: 100%;
            text-align: center;
            position: relative; 
        }

        /* 修正：✕ボタンを右上に配置 */
        .modal-close-icon {
            position: absolute;
            top: 15px;  
            right: 15px; 
            font-size: 1.2rem; 
            font-weight: bold;
            color: var(--main);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: auto;
            height: auto;
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-label">8 ROUNDS TABATA</div>
    <div id="display" class="timer-display">00</div>
    <div id="round-info" class="round-counter">SET: 1 / 8</div>

    <div id="setup-area" class="settings-grid">
        <div class="input-group">
            <label>Work(s)</label>
            <input type="number" id="workInput" value="20" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>Rest(s)</label>
            <input type="number" id="restInput" value="10" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>Sets</label>
            <input type="number" id="setsInput" value="8" inputmode="numeric">
        </div>
    </div>

    <button id="startBtn">START</button>
    <button id="stopBtn" class="stop hidden">STOP</button>
</div>

<footer>
    <div class="support-links">
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕ Ko-fi</a>
        <button class="install-btn" onclick="document.getElementById('modal').style.display='flex'">📱 App</button>
    </div>
    No login / No tracking / No ads / Browser only<br>
    <a href="#" style="color:inherit; text-decoration:none;">Privacy Policy</a> / afrorakda © 2026
</footer>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close-icon" onclick="document.getElementById('modal').style.display='none'">✕</button>
        <h3 style="margin-top:10px;">Install App</h3>
        <p>🍏 Safari: Share > Add to Home Screen</p>
        <p>🤖 Chrome: Menu > Install App</p>
    </div>
</div>

<script>
    let timer = null;
    let timeLeft = 0;
    let currentSet = 1;
    let totalSets = 8;
    let isWorking = true;

    const statusLabel = document.getElementById('status');
    const display = document.getElementById('display');
    const roundInfo = document.getElementById('round-info');
    const setupArea = document.getElementById('setup-area');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    // 修正：入力窓タップで全選択
    const inputIds = ['workInput', 'restInput', 'setsInput'];
    inputIds.forEach(id => {
        const input = document.getElementById(id);
        const saved = localStorage.getItem(id);
        if (saved) input.value = saved;
        input.addEventListener('focus', () => input.select());
        input.addEventListener('input', (e) => {
            localStorage.setItem(id, e.target.value);
            updateRoundDisplay();
        });
    });

    function updateRoundDisplay() {
        totalSets = parseInt(document.getElementById('setsInput').value) || 0;
        roundInfo.innerText = `SET: ${currentSet} / ${totalSets}`;
    }

    function notify(type) {
        if ("vibrate" in navigator) navigator.vibrate(type === 'work' ? [300, 100, 300] : [500]);
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = type === 'work' ? 880 : 440;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
    }

    function tick() {
        if (timeLeft <= 0) {
            if (isWorking) {
                isWorking = false;
                timeLeft = parseInt(document.getElementById('restInput').value);
                document.body.className = 'rest';
                statusLabel.innerText = 'REST';
                notify('rest');
            } else {
                currentSet++;
                if (currentSet > totalSets) {
                    finish();
                    return;
                }
                isWorking = true;
                timeLeft = parseInt(document.getElementById('workInput').value);
                document.body.className = 'work';
                statusLabel.innerText = 'WORK';
                notify('work');
            }
            updateRoundDisplay();
        }
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        timeLeft--;
    }

    function finish() {
        clearInterval(timer);
        statusLabel.innerText = 'DONE!';
        display.innerText = '00';
        document.body.className = '';
        setupArea.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        notify('rest');
    }

    startBtn.onclick = () => {
        currentSet = 1;
        isWorking = true;
        totalSets = parseInt(document.getElementById('setsInput').value) || 0;
        timeLeft = parseInt(document.getElementById('workInput').value);
        if (totalSets <= 0 || timeLeft <= 0) return;
        setupArea.classList.add('hidden');
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
        document.body.className = 'work';
        statusLabel.innerText = 'WORK';
        updateRoundDisplay();
        notify('work');
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        timeLeft--;
        timer = setInterval(tick, 1000);
    };

    stopBtn.onclick = () => {
        clearInterval(timer);
        setupArea.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        document.body.className = '';
        statusLabel.innerText = '8 ROUNDS TABATA';
        display.innerText = '00';
        currentSet = 1;
        updateRoundDisplay();
    };

    updateRoundDisplay();
</script>

</body>
</html>
