<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8 Rounds Tabata - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_35.png">
    <link rel="icon" type="image/png" href="image_35.png">
    <style>
        :root { 
            --bg: #fff; 
            --main: #333; 
            --accent: #eee; 
            --input-bg: #fafafa; 
            --radius: 15px; 
            --rest-green: #e8f5e9; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body { 
            margin: 0; 
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 20px env(safe-area-inset-bottom, 20px);
            background-color: var(--bg); 
            color: var(--main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            transition: background-color 0.3s ease; 
            align-items: center;
        }

        .fridge-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; flex-grow: 1; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            width: 100%;
        }

        h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.5px; margin: 0; }

        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 12px; border-radius: 10px;
        }

        body.work { background-color: var(--bg); }
        body.rest { background-color: var(--rest-green); }

        .timer-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #status { font-weight: 900; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #display { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; }
        #round-info { font-weight: 800; font-size: 1.1rem; margin-bottom: 40px; color: #999; }

        .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 0.65rem; font-weight: 900; color: #bbb; text-transform: uppercase; }
        
        input { 
            -webkit-appearance: none; 
            -webkit-text-fill-color: var(--main) !important; 
            opacity: 1 !important; 
            border: 2px solid var(--accent); 
            background: var(--input-bg); 
            color: var(--main); 
            font-size: 1.8rem; 
            font-weight: 800; 
            text-align: center; 
            width: 100%; 
            padding: 12px; 
            border-radius: var(--radius); 
            margin-top: 5px; 
            outline: none; 
        }

        .main-btn { 
            -webkit-appearance: none; 
            background: var(--main); 
            color: #fff; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            border-radius: var(--radius); 
            font-size: 1.4rem; 
            font-weight: 900; 
            cursor: pointer; 
            transition: transform 0.1s; 
        }
        .main-btn:active { transform: scale(0.97); }
        #stopBtn { background: var(--accent); color: var(--main); margin-top: 15px; }
        .hidden { display: none !important; }

        /* Footer & Buttons */
        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 40px; width: 100%; }
        .kofi-btn, .home-btn { 
            display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px; 
            border-radius: var(--radius); font-weight: 800; font-size: 0.9rem; text-decoration: none; border: none; cursor: pointer; 
        }
        .kofi-btn { background: #fff; color: var(--main); border: 2px solid var(--main); }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { padding: 30px 0; text-align: center; font-size: 0.75rem; color: #bbb; line-height: 1.8; font-weight: 600; width: 100%; }
        footer a { color: inherit; text-decoration: underline; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); max-width: 320px; width: 90%; position: relative; }
        .modal-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 1.1rem; font-weight: 900; }
        .close-icon { position: absolute; top: 15px; right: 15px; font-size: 1.8rem; color: #ccc; cursor: pointer; line-height: 1; }
    </style>
</head>
<body class="work">

<div class="fridge-container">
    <header>
        <h1>8 Rounds Tabata</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div class="timer-box">
        <div id="status">8 ROUNDS TABATA</div>
        <div id="display">00</div>
        <div id="round-info">SET: 1 / 8</div>

        <div id="setup-area" class="settings-grid">
            <div class="input-group"><label>Work(s)</label><input type="number" id="workInput" value="20" inputmode="numeric"></div>
            <div class="input-group"><label>Rest(s)</label><input type="number" id="restInput" value="10" inputmode="numeric"></div>
            <div class="input-group"><label>Sets</label><input type="number" id="setsInput" value="8" inputmode="numeric"></div>
        </div>

        <button id="startBtn" class="main-btn">START</button>
        <button id="stopBtn" class="main-btn hidden">STOP</button>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a><br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <div class="modal-title-row"><span>📱</span><strong>Install</strong></div>
        <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">Add to your home screen.</p>
        <div style="font-size: 0.9rem; line-height: 1.6; color: #333;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    let timer = null, timeLeft = 0, currentSet = 1, totalSets = 8, isWorking = true;
    const statusLabel = document.getElementById('status'), display = document.getElementById('display'), roundInfo = document.getElementById('round-info'), setupArea = document.getElementById('setup-area'), startBtn = document.getElementById('startBtn'), stopBtn = document.getElementById('stopBtn');

    // Input Logic
    const inputIds = ['workInput', 'restInput', 'setsInput'];
    inputIds.forEach(id => {
        const input = document.getElementById(id);
        const saved = localStorage.getItem(id);
        if (saved) input.value = saved;
        input.addEventListener('focus', () => input.select());
        input.addEventListener('input', (e) => { localStorage.setItem(id, e.target.value); updateRoundDisplay(); });
    });

    function updateRoundDisplay() { 
        totalSets = parseInt(document.getElementById('setsInput').value) || 0; 
        roundInfo.innerText = `SET: ${currentSet} / ${totalSets}`; 
    }

    function notify(type) {
        if ("vibrate" in navigator) navigator.vibrate(type === 'work' ? [300, 100, 300] : [500]);
        try { 
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain(); 
            osc.connect(gain); 
            gain.connect(audioCtx.destination); 
            osc.frequency.value = type === 'work' ? 880 : 440; 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            osc.start(); 
            osc.stop(audioCtx.currentTime + 0.3); 
        } catch(e) {}
    }

    function tick() {
        if (timeLeft <= 0) {
            if (isWorking) { 
                isWorking = false; 
                timeLeft = parseInt(document.getElementById('restInput').value); 
                document.body.className = 'rest'; 
                statusLabel.innerText = 'REST'; 
                notify('rest'); 
            } else { 
                currentSet++; 
                if (currentSet > totalSets) { finish(); return; } 
                isWorking = true; 
                timeLeft = parseInt(document.getElementById('workInput').value); 
                document.body.className = 'work'; 
                statusLabel.innerText = 'WORK'; 
                notify('work'); 
            }
            updateRoundDisplay();
        }
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft; 
        timeLeft--;
    }

    function finish() { 
        clearInterval(timer); 
        statusLabel.innerText = 'DONE!'; 
        display.innerText = '00'; 
        document.body.className = 'work'; 
        setupArea.classList.remove('hidden'); 
        startBtn.classList.remove('hidden'); 
        stopBtn.classList.add('hidden'); 
        notify('rest'); 
    }

    startBtn.onclick = () => {
        currentSet = 1; isWorking = true; 
        totalSets = parseInt(document.getElementById('setsInput').value) || 0; 
        timeLeft = parseInt(document.getElementById('workInput').value);
        if (totalSets <= 0 || timeLeft <= 0) return;
        setupArea.classList.add('hidden'); 
        startBtn.classList.add('hidden'); 
        stopBtn.classList.remove('hidden');
        document.body.className = 'work'; 
        statusLabel.innerText = 'WORK'; 
        updateRoundDisplay(); 
        notify('work');
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft; 
        timeLeft--;
        timer = setInterval(tick, 1000);
    };

    stopBtn.onclick = () => { 
        clearInterval(timer); 
        setupArea.classList.remove('hidden'); 
        startBtn.classList.remove('hidden'); 
        stopBtn.classList.add('hidden'); 
        document.body.className = 'work'; 
        statusLabel.innerText = 'TABATA'; 
        display.innerText = '00'; 
        currentSet = 1; 
        updateRoundDisplay(); 
    };

    // Footer & Modal Logic
    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch(e) { /* Fallback to static HTML */ }
    }
    window.onload = () => { loadFooter(); updateRoundDisplay(); };
</script>
</body>
</html>
