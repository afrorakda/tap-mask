<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8 Rounds Tabata - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_35.png">
    <link rel="icon" type="image/png" href="image_35.png">
    <style>
        :root { --bg: #fff; --main: #333; --accent: #eee; --input-bg: #fafafa; --radius: 15px; --rest-green: #e8f5e9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.3s ease; }
        body.work { background-color: var(--bg); }
        body.rest { background-color: var(--rest-green); }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; max-width: 400px; margin: 0 auto; width: 100%; }
        .status-label { font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .timer-display { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; }
        .round-counter { font-weight: bold; font-size: 1.2rem; margin-bottom: 40px; color: #888; }

        .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 0.7rem; font-weight: bold; color: #999; text-transform: uppercase; }
        input { -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important; border: 1px solid var(--accent); background: var(--input-bg); color: var(--main); font-size: 2rem; font-weight: bold; text-align: center; width: 100%; padding: 15px; border-radius: var(--radius); margin-top: 8px; outline: none; }

        button { -webkit-appearance: none; background: var(--main); color: #fff; border: none; padding: 22px; width: 100%; border-radius: var(--radius); font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.97); }
        #stopBtn { background: var(--accent); color: var(--main); margin-top: 15px; }
        .hidden { display: none !important; }

        /* Footer 修復：横幅とボタン名を元の状態に戻す */
        footer { padding: 20px; text-align: center; font-size: 0.7rem; color: #bbb; line-height: 1.6; }
        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding: 20px 0; width: 100%; }
        .kofi-btn, .home-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; max-width: 320px; padding: 12px 20px; border-radius: var(--radius); font-weight: bold; font-size: 0.85rem; text-decoration: none; border: none; cursor: pointer; }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); }

        /* Modal：✕ボタン位置のみを修正（構造はJson-clean準拠） */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; max-width: 320px; width: 90%; position: relative; text-align: left; }
        .modal-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; font-weight: 800; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; padding: 5px; line-height: 1; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-label">8 ROUNDS TABATA</div>
    <div id="display" class="timer-display">00</div>
    <div id="round-info" class="round-counter">SET: 1 / 8</div>

    <div id="setup-area" class="settings-grid">
        <div class="input-group"><label>Work(s)</label><input type="number" id="workInput" value="20" inputmode="numeric"></div>
        <div class="input-group"><label>Rest(s)</label><input type="number" id="restInput" value="10" inputmode="numeric"></div>
        <div class="input-group"><label>Sets</label><input type="number" id="setsInput" value="8" inputmode="numeric"></div>
    </div>

    <button id="startBtn">START</button>
    <button id="stopBtn" class="hidden">STOP</button>
</div>

<div class="footer-btns">
    <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">🍵 Support me on Ko-fi</a>
    <button class="home-btn" id="homeBtn">Add to Home Screen</button>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    afrorakda © 2026
</footer>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <div class="modal-title-row"><span>📱</span><strong>Install</strong></div>
        <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">Add to home screen.</p>
        <div style="font-size: 0.95rem; line-height: 1.5; color: #333;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    let timer = null, timeLeft = 0, currentSet = 1, totalSets = 8, isWorking = true;
    const statusLabel = document.getElementById('status'), display = document.getElementById('display'), roundInfo = document.getElementById('round-info'), setupArea = document.getElementById('setup-area'), startBtn = document.getElementById('startBtn'), stopBtn = document.getElementById('stopBtn');

    const inputIds = ['workInput', 'restInput', 'setsInput'];
    inputIds.forEach(id => {
        const input = document.getElementById(id);
        const saved = localStorage.getItem(id);
        if (saved) input.value = saved;
        input.addEventListener('focus', () => input.select());
        input.addEventListener('input', (e) => { localStorage.setItem(id, e.target.value); updateRoundDisplay(); });
    });

    function updateRoundDisplay() { totalSets = parseInt(document.getElementById('setsInput').value) || 0; roundInfo.innerText = `SET: ${currentSet} / ${totalSets}`; }
    function notify(type) {
        if ("vibrate" in navigator) navigator.vibrate(type === 'work' ? [300, 100, 300] : [500]);
        try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = type === 'work' ? 880 : 440; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3); } catch(e) {}
    }
    function tick() {
        if (timeLeft <= 0) {
            if (isWorking) { isWorking = false; timeLeft = parseInt(document.getElementById('restInput').value); document.body.className = 'rest'; statusLabel.innerText = 'REST'; notify('rest'); }
            else { currentSet++; if (currentSet > totalSets) { finish(); return; } isWorking = true; timeLeft = parseInt(document.getElementById('workInput').value); document.body.className = 'work'; statusLabel.innerText = 'WORK'; notify('work'); }
            updateRoundDisplay();
        }
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft; timeLeft--;
    }
    function finish() { clearInterval(timer); statusLabel.innerText = 'DONE!'; display.innerText = '00'; document.body.className = ''; setupArea.classList.remove('hidden'); startBtn.classList.remove('hidden'); stopBtn.classList.add('hidden'); notify('rest'); }

    startBtn.onclick = () => {
        currentSet = 1; isWorking = true; totalSets = parseInt(document.getElementById('setsInput').value) || 0; timeLeft = parseInt(document.getElementById('workInput').value);
        if (totalSets <= 0 || timeLeft <= 0) return;
        setupArea.classList.add('hidden'); startBtn.classList.add('hidden'); stopBtn.classList.remove('hidden');
        document.body.className = 'work'; statusLabel.innerText = 'WORK'; updateRoundDisplay(); notify('work');
        display.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft; timeLeft--;
        timer = setInterval(tick, 1000);
    };

    stopBtn.onclick = () => { clearInterval(timer); setupArea.classList.remove('hidden'); startBtn.classList.remove('hidden'); stopBtn.classList.add('hidden'); document.body.className = ''; statusLabel.innerText = '8 ROUNDS TABATA'; display.innerText = '00'; currentSet = 1; updateRoundDisplay(); };

    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

    updateRoundDisplay();
</script>
</body>
</html>
